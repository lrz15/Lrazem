<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دي جي شواحة PRO | المكتبة الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0e14;
            --deck-bg: #161b22;
            --accent-neon: #00f2ff;
            --accent-pink: #ff007a;
            --text-color: #e6edf3;
            --border-color: #30363d;
        }

        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg-main); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; padding: 15px;
        }

        .mixer-wrap {
            background: #1d2127; padding: 20px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid var(--border-color);
            width: 100%; max-width: 700px; margin-bottom: 20px;
        }

        .decks-row { display: flex; gap: 15px; justify-content: space-around; flex-wrap: wrap; }

        .deck {
            flex: 1; min-width: 250px; background: var(--deck-bg); border-radius: 15px;
            padding: 15px; text-align: center; border-bottom: 5px solid var(--accent-neon);
        }

        .disc {
            width: 100px; height: 100px; border-radius: 50%;
            background: radial-gradient(circle, #333 10%, #000 40%, #111 70%);
            margin: 10px auto; border: 4px solid #222;
            animation: spin 3s linear infinite paused;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .fader-section { margin: 15px 0; text-align: center; }
        .crossfader { width: 80%; accent-color: var(--accent-neon); cursor: pointer; }

        /* قسم المكتبة والبحث */
        .library-deck {
            width: 100%; max-width: 700px; background: var(--deck-bg); padding: 20px;
            border-radius: 15px; border: 1px solid var(--border-color); box-sizing: border-box;
        }

        .add-zone { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #333; }
        .input-row { display: flex; gap: 10px; }
        input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; font-family: 'Cairo'; }

        .search-row { margin-bottom: 15px; }
        .search-row input { width: 100%; box-sizing: border-box; border-color: var(--accent-neon); }

        .results-container { max-height: 250px; overflow-y: auto; background: #0d1117; border-radius: 8px; }
        .song-item {
            display: flex; justify-content: space-between; align-items: center; padding: 12px;
            border-bottom: 1px solid #222; cursor: pointer;
        }
        .song-item:hover { background: rgba(0, 242, 255, 0.1); }
        .delete-btn { color: #ff4444; font-size: 12px; border: 1px solid #ff4444; padding: 2px 5px; border-radius: 4px; }

        button { background: var(--accent-neon); color: black; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #2ea44f; color: white; }
    </style>
</head>
<body>

    <h2 style="margin-bottom:10px;">🎧 دي جي شواحة PRO - النسخة المستقرة 🎧</h2>

    <div class="mixer-wrap">
        <div class="decks-row">
            <div class="deck">
                <h4 id="nameA">TRACK A</h4>
                <div id="discA" class="disc"></div>
                <audio id="audioA"></audio>
                <button onclick="toggle('A')">PLAY / PAUSE</button>
            </div>
            <div class="deck" style="border-bottom-color: var(--accent-pink);">
                <h4 id="nameB">TRACK B</h4>
                <div id="discB" class="disc"></div>
                <audio id="audioB"></audio>
                <button onclick="toggle('B')">PLAY / PAUSE</button>
            </div>
        </div>
        <div class="fader-section">
            <input type="range" id="crossfader" class="crossfader" min="0" max="1" step="0.01" value="0.5" oninput="applyMix()">
        </div>
    </div>

    <div class="library-deck">
        <div class="add-zone">
            <div style="font-size: 14px; color: #888;">➕ إضافة أغنية جديدة للمكتبة:</div>
            <div class="input-row">
                <input type="text" id="newSongName" placeholder="اسم الأغنية...">
                <input type="text" id="newSongUrl" placeholder="رابط MP3 من ألبوماتي...">
                <button class="btn-add" onclick="saveToLibrary()">حفظ 💾</button>
            </div>
        </div>

        <div class="search-row">
            <input type="text" id="searchInput" placeholder="ابحث داخل مكتبتك الخاصة..." oninput="displayLibrary()">
        </div>

        <div id="libraryContainer" class="results-container">
            </div>
    </div>

    <script>
        const audioA = document.getElementById('audioA');
        const audioB = document.getElementById('audioB');
        let myLibrary = JSON.parse(localStorage.getItem('dj_library')) || [];

        // حفظ أغنية في الذاكرة
        function saveToLibrary() {
            const name = document.getElementById('newSongName').value.trim();
            let url = document.getElementById('newSongUrl').value.trim();

            if (!name || !url) { alert("يرجى ملء الاسم والرابط"); return; }

            // تحويل رابط الصفحة إلى رابط MP3 إذا لزم الأمر
            if (url.includes("albumaty.com/song/")) {
                url = url.replace("/song/", "/download/").split('.html')[0] + ".mp3";
            }

            myLibrary.push({ id: Date.now(), name, url });
            localStorage.setItem('dj_library', JSON.stringify(myLibrary));
            
            document.getElementById('newSongName').value = "";
            document.getElementById('newSongUrl').value = "";
            displayLibrary();
        }

        // عرض المكتبة مع ميزة البحث
        function displayLibrary() {
            const container = document.getElementById('libraryContainer');
            const term = document.getElementById('searchInput').value.toLowerCase();
            container.innerHTML = "";

            const filtered = myLibrary.filter(s => s.name.toLowerCase().includes(term));

            if (filtered.length === 0) {
                container.innerHTML = "<p style='text-align:center; padding:10px; color:#666;'>المكتبة فارغة أو لا توجد نتائج.</p>";
                return;
            }

            filtered.forEach(song => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `
                    <div onclick="loadToDeck('${song.url}', '${song.name}')" style="flex:1">🎵 ${song.name}</div>
                    <span class="delete-btn" onclick="deleteSong(${song.id})">حذف</span>
                `;
                container.appendChild(div);
            });
        }

        function loadToDeck(url, name) {
            const choice = confirm(`تحميل "${name}"؟\n\nOK = Deck A (يسار)\nCancel = Deck B (يمين)`);
            if (choice) {
                audioA.src = url;
                document.getElementById('nameA').innerText = name;
                audioA.play();
                document.getElementById('discA').style.animationPlayState = 'running';
            } else {
                audioB.src = url;
                document.getElementById('nameB').innerText = name;
                audioB.play();
                document.getElementById('discB').style.animationPlayState = 'running';
            }
        }

        function deleteSong(id) {
            myLibrary = myLibrary.filter(s => s.id !== id);
            localStorage.setItem('dj_library', JSON.stringify(myLibrary));
            displayLibrary();
        }

        function toggle(deck) {
            const audio = (deck === 'A') ? audioA : audioB;
            const disc = (deck === 'A') ? document.getElementById('discA') : document.getElementById('discB');
            if (audio.paused) { audio.play(); disc.style.animationPlayState = 'running'; }
            else { audio.pause(); disc.style.animationPlayState = 'paused'; }
        }

        function applyMix() {
            const f = document.getElementById('crossfader').value;
            audioA.volume = 1 - f;
            audioB.volume = f;
        }

        // تشغيل العرض عند فتح الصفحة
        displayLibrary();
    </script>
</body>
</html>
