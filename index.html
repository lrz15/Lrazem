<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashes Studio - الرئيسية</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            /* إضافة صورة الهيرو كخلفية */
            background-image: url('hero.png'); 
            background-size: cover; /* تجعل الصورة تغطي الصفحة بالكامل */
            background-position: center; /* تمركز الصورة */
            background-repeat: no-repeat;
            background-attachment: fixed; /* تثبيت الخلفية عند التمرير */
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative; /* ضروري لطبقة التعتيم */
        }

        /* طبقة تعتيم فوق الصورة لبروز النص */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); /* لون أسود بشفافية 70% */
            z-index: 1;
        }

        /* جعل المحتوى فوق طبقة التعتيم */
        .content-wrapper {
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 4rem; /* تكبير العنوان قليلاً */
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 15px #1db954, 0 0 30px #1db954; /* تعزيز تأثير النيون */
        }

        p {
            font-size: 1.3rem;
            color: #ccc; /* تفتيح لون الوصف */
            margin-top: 15px;
            font-weight: 300;
        }

        .menu {
            display: flex;
            gap: 25px;
            margin-top: 50px;
            justify-content: center;
        }

        .btn {
            text-decoration: none;
            padding: 18px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.4s ease-in-out;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .btn-primary {
            background: #1db954;
            color: #000;
            box-shadow: 0 5px 15px rgba(29, 185, 84, 0.3);
        }

        .btn-primary:hover {
            background: transparent;
            color: #1db954;
            border-color: #1db954;
            box-shadow: 0 0 30px #1db954;
            transform: translateY(-3px); /* حركة خفيفة للأعلى */
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1); /* خلفية نصف شفافة */
            color: #fff;
            border-color: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(5px); /* تأثير تضبيب خلف الزر */
        }

        .btn-secondary:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
            transform: translateY(-3px);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <div class="logo-container">
            <h1>ASHES STUDIO</h1>
            <p>مرحباً بك في عالم الموسيقى السحابية</p>
        </div>

        <div class="menu">
            <a href="dj-player.html" class="btn btn-primary">
                🎧 دخول استوديو دي جي شواحة
            </a>
            
            <a href="add-song.html" class="btn btn-secondary">
                ➕ إضافة أغاني جديدة
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 ASHES STUDIO - ALL RIGHTS RESERVED
    </div>

</body>
</html>
    </div>

</body>
</html>
