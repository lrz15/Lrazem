<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دي جي شواحة PRO | النسخة العالمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0e14;
            --deck-bg: #161b22;
            --accent-neon: #00f2ff;
            --accent-pink: #ff007a;
            --text-color: #e6edf3;
            --border-color: #30363d;
        }

        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg-main); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; padding: 15px;
        }

        /* الميكسر */
        .mixer-wrap {
            background: #1d2127; padding: 20px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid var(--border-color);
            width: 100%; max-width: 700px; margin-bottom: 20px;
        }

        .decks-row { display: flex; gap: 15px; justify-content: space-around; flex-wrap: wrap; }

        .deck {
            flex: 1; min-width: 250px; background: var(--deck-bg); border-radius: 15px;
            padding: 15px; text-align: center; border-bottom: 5px solid var(--accent-neon);
        }

        .disc {
            width: 110px; height: 110px; border-radius: 50%;
            background: radial-gradient(circle, #333 10%, #000 40%, #111 70%);
            margin: 10px auto; border: 4px solid #222;
            animation: spin 3s linear infinite paused;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .fader-section { margin: 15px 0; text-align: center; }
        .crossfader { width: 80%; accent-color: var(--accent-neon); cursor: pointer; }

        /* البحث والمكتبة */
        .library-deck {
            width: 100%; max-width: 700px; background: var(--deck-bg); padding: 20px;
            border-radius: 15px; border: 1px solid var(--border-color); box-sizing: border-box;
        }

        .search-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-row input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #0d1117; color: white; font-family: 'Cairo'; }

        .results-container { max-height: 300px; overflow-y: auto; background: #0d1117; border-radius: 8px; }
        .song-item {
            display: flex; align-items: center; padding: 12px;
            border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s;
        }
        .song-item:hover { background: rgba(0, 242, 255, 0.1); }
        .song-item img { width: 40px; height: 40px; border-radius: 4px; margin-left: 12px; }

        button { background: var(--accent-neon); color: black; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .loader { display: none; text-align: center; color: var(--accent-neon); padding: 10px; }
    </style>
</head>
<body>

    <h2 style="margin-bottom:10px;">🎧 دي جي شواحة PRO - النسخة العالمية 🎧</h2>

    <div class="mixer-wrap">
        <div class="decks-row">
            <div class="deck">
                <h4 id="nameA">TRACK A</h4>
                <div id="discA" class="disc"></div>
                <audio id="audioA" crossorigin="anonymous"></audio>
                <button onclick="toggle('A')">PLAY / PAUSE</button>
            </div>
            <div class="deck" style="border-bottom-color: var(--accent-pink);">
                <h4 id="nameB">TRACK B</h4>
                <div id="discB" class="disc"></div>
                <audio id="audioB" crossorigin="anonymous"></audio>
                <button onclick="toggle('B')">PLAY / PAUSE</button>
            </div>
        </div>
        <div class="fader-section">
            <div style="font-size: 12px; margin-bottom: 5px; color: var(--accent-neon);">🎚️ شريط الكونفنس (Crossfader)</div>
            <input type="range" id="crossfader" class="crossfader" min="0" max="1" step="0.01" value="0.5" oninput="applyMix()">
        </div>
    </div>

    <div class="library-deck">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="ابحث عن أغنية، فنان، أو مهرجان..." onkeypress="if(event.key === 'Enter') searchMusic()">
            <button onclick="searchMusic()">بحث 🔍</button>
        </div>
        <div id="loader" class="loader">جاري البحث في المكتبة العالمية...</div>
        <div id="results" class="results-container">
            </div>
    </div>

    <script>
        const audioA = document.getElementById('audioA');
        const audioB = document.getElementById('audioB');

        async function searchMusic() {
            const query = document.getElementById('searchInput').value.trim();
            const results = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!query) return;
            results.innerHTML = "";
            loader.style.display = "block";

            // استخدام iTunes API (مجاني، لا يحتاج مفتاح، وسريع جداً)
            const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=20&country=JO`;

            try {
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.results.length === 0) {
                    results.innerHTML = "<p style='text-align:center; padding:20px;'>لم نجد نتائج. حاول كتابة الاسم بشكل أوضح.</p>";
                }

                data.results.forEach(song => {
                    const div = document.createElement('div');
                    div.className = 'song-item';
                    div.innerHTML = `
                        <img src="${song.artworkUrl60}" alt="cover">
                        <div style="flex:1">
                            <div style="font-weight:bold">${song.trackName}</div>
                            <div style="font-size:12px; color:#888">${song.artistName}</div>
                        </div>
                        <small>اختر Deck</small>
                    `;
                    div.onclick = () => loadToDeck(song.previewUrl, song.trackName);
                    results.appendChild(div);
                });
            } catch (e) {
                results.innerHTML = "<p style='text-align:center; color:red; padding:20px;'>فشل الاتصال بالمكتبة. تأكد من الإنترنت.</p>";
            } finally {
                loader.style.display = "none";
            }
        }

        function loadToDeck(url, name) {
            const choice = confirm(`تحميل أغنية "${name}"؟\n\nOK = Deck A (يسار)\nCancel = Deck B (يمين)`);
            const targetAudio = choice ? audioA : audioB;
            const targetName = choice ? document.getElementById('nameA') : document.getElementById('nameB');
            const targetDisc = choice ? document.getElementById('discA') : document.getElementById('discB');

            targetAudio.src = url;
            targetName.innerText = name;
            
            targetAudio.play().then(() => {
                targetDisc.style.animationPlayState = 'running';
            }).catch(() => {
                alert("اضغط Play يدوياً لتشغيل الموسيقى.");
            });
        }

        function toggle(deck) {
            const audio = (deck === 'A') ? audioA : audioB;
            const disc = (deck === 'A') ? document.getElementById('discA') : document.getElementById('discB');
            if (audio.paused) {
                audio.play();
                disc.style.animationPlayState = 'running';
            } else {
                audio.pause();
                disc.style.animationPlayState = 'paused';
            }
        }

        function applyMix() {
            const f = document.getElementById('crossfader').value;
            audioA.volume = 1 - f;
            audioB.volume = f;
        }
    </script>
</body>
</html>
