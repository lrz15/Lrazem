<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ashes Studio - الرئيسية</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .logo-container {
            margin-bottom: 50px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #fff;
            text-shadow: 0 0 15px #1db954;
        }

        p {
            font-size: 1.2rem;
            color: #888;
            margin-top: 10px;
        }

        .menu {
            display: flex;
            gap: 25px;
            margin-top: 30px;
        }

        .btn {
            text-decoration: none;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.4s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: #1db954;
            color: #000;
        }

        .btn-primary:hover {
            background: transparent;
            color: #1db954;
            border-color: #1db954;
            box-shadow: 0 0 20px #1db954;
        }

        .btn-secondary {
            background: transparent;
            color: #fff;
            border-color: #444;
        }

        .btn-secondary:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <h1>ASHES STUDIO</h1>
        <p>مرحباً بك في عالم الموسيقى السحابية</p>
    </div>

    <div class="menu">
        <a href="dj-player.html" class="btn btn-primary">
            🎧 دخول استوديو دي جي شواحة
        </a>
        
        <a href="add-song.html" class="btn btn-secondary">
            ➕ إضافة أغاني جديدة
        </a>
    </div>

    <div class="footer">
        © 2026 ASHES STUDIO - ALL RIGHTS RESERVED
    </div>

</body>
</html>
