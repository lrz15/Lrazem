<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متصفح يوتيوب المزدوج - شواحة</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #0f0f0f;
            font-family: sans-serif;
        }

        /* عنوان علوي بسيط */
        .header {
            height: 40px;
            background: #202020;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff0000;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }

        /* حاوية المتصفحين */
        .browser-container {
            display: flex;
            height: calc(100vh - 40px); /* طرح طول الهيدر */
            width: 100vw;
        }

        /* كل خانة متصفح */
        .browser-pane {
            flex: 1;
            border: 1px solid #333;
            position: relative;
        }

        /* الفاصل الأوسط */
        .divider {
            width: 5px;
            background: #333;
            cursor: col-resize;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* رسالة توضيحية في حال حجب الموقع */
        .fallback-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #888;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="header">🎧 دي جي شواحة - متصفح يوتيوب المزدوج 🎧</div>

    <div class="browser-container">
        <div class="browser-pane">
            <div class="fallback-msg">جاري تحميل يوتيوب الرئيسي (A)...</div>
            <iframe src="https://www.youtube.com"></iframe>
        </div>

        <div class="divider"></div>

        <div class="browser-pane">
            <div class="fallback-msg">جاري تحميل يوتيوب الرئيسي (B)...</div>
            <iframe src="https://www.youtube.com"></iframe>
        </div>
    </div>

</body>
</html>
