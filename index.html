<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دي جي شواحة 🎧</title>
    <style>
        :root {
            --accent-color: #ff4141;
            --bg-black: #0a0a0a;
            --panel-bg: #1a1a1a;
        }

        body {
            background-color: var(--bg-black);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 { color: var(--accent-color); margin-bottom: 20px; }

        .mixer-container {
            display: flex;
            gap: 15px;
            background: #111;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #333;
            width: 95%;
            max-width: 900px;
            justify-content: center;
            align-items: center;
        }

        .deck {
            background: var(--panel-bg);
            padding: 15px;
            border-radius: 10px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-slot {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 5px;
            overflow: hidden;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .controls-row {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-top: 10px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            cursor: pointer;
        }

        .label {
            font-size: 0.7rem;
            text-align: center;
            color: #888;
            text-transform: uppercase;
        }

        /* الجزء الأوسط (الكروس فيدر) */
        .center-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
            width: 80px;
        }

        .crossfader-wrap {
            transform: rotate(-90deg); /* لجعل السلايدر عمودي إذا أردت أو اتركه أفقي */
            width: 100px;
        }

        .btn-stop {
            background: #333;
            color: white;
            border: none;
            padding: 10px 5px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
        }

        .btn-stop:hover { background: var(--accent-color); }
    </style>
</head>
<body>

    <h1>🎧 دي جي شواحة 🎧</h1>

    <div class="mixer-container">
        <div class="deck">
            <div class="video-slot">
                <iframe src="https://www.youtube.com/embed?listType=search&list=مهرجانات"></iframe>
            </div>
            <div class="controls-row">
                <input type="text" placeholder="بحث في القناة A..." style="background:#222; border:1px solid #444; color:white; padding:5px; border-radius:4px; font-size: 0.8rem;">
                <div class="label">LEVEL A</div>
                <input type="range" min="0" max="100" value="80">
            </div>
        </div>

        <div class="center-section">
            <div class="label">CROSSFADER</div>
            <input type="range" min="0" max="100" value="50">
            <button class="btn-stop">STOP ALL</button>
        </div>

        <div class="deck">
            <div class="video-slot">
                <iframe src="https://www.youtube.com/embed?listType=search&list=شعبي"></iframe>
            </div>
            <div class="controls-row">
                <input type="text" placeholder="بحث في القناة B..." style="background:#222; border:1px solid #444; color:white; padding:5px; border-radius:4px; font-size: 0.8rem;">
                <div class="label">LEVEL B</div>
                <input type="range" min="0" max="100" value="80">
            </div>
        </div>
    </div>

</body>
</html>
