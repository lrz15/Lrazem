<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دي جي شواحة - الاستوديو الرئيسي</title>
    <style>
        /* إعدادات الشاشة الكاملة */
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden; 
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* حاوية الخلفية */
        .hero-section {
            background-image: url('hero.png'); /* الصورة الخام بدون أزرار */
            background-size: cover;
            background-position: center;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 40px 20px;
        }

        /* النصوص العلوية */
        .top-nav {
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .title-text {
            color: white;
            font-size: clamp(2rem, 8vw, 4rem); /* حجم مرن حسب الشاشة */
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin: 0;
        }

        /* منطقة الأزرار في الأسفل */
        .bottom-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .row {
            display: flex;
            gap: 25px;
            justify-content: center;
            width: 100%;
        }

        /* تصميم الأزرار كما في رؤيتك */
        .btn {
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn:hover {
            transform: scale(1.05);
            background: #00ffcc; /* لمسة نيون عند المرور */
            box-shadow: 0 0 20px #00ffcc;
        }

        /* أحجام الأزرار المختلفة */
        .btn-large {
            width: 160px;
            height: 55px;
            font-size: 1.5rem;
        }

        .btn-small {
            width: 140px;
            height: 45px;
            font-size: 1rem;
            text-align: center;
            line-height: 1.2;
        }

    </style>
</head>
<body>

    <div class="hero-section">
        <div class="top-nav">
            <h1 class="title-text">شواحة</h1>
            <h1 class="title-text">دي جي</h1>
        </div>

        <div class="bottom-controls">
            <div class="row">
                <a href="mixer.html" class="btn btn-large">الدي جي</a>
                <a href="add-song.html" class="btn btn-large">اضافة</a>
            </div>
            
            <div class="row">
                <a href="library.html" class="btn btn-small">القائمة</a>
                <a href="#" class="btn btn-small">نبذة عن<br>المشروع</a>
            </div>
        </div>
    </div>

</body>
</html>
