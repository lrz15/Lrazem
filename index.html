<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>DJ Mixer Pro+ | محرك بحث ألبوماتي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0e14;
            --deck-bg: #161b22;
            --accent-neon: #00f2ff;
            --accent-pink: #ff007a;
            --text-color: #e6edf3;
            --border-color: #30363d;
        }

        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg-main); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; padding: 20px;
        }

        .mixer-wrap {
            background: #1d2127; padding: 30px; border-radius: 25px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6); border: 1px solid var(--border-color);
        }

        .decks-row { display: flex; gap: 30px; align-items: center; justify-content: center; }

        .deck {
            width: 280px; background: var(--deck-bg); border-radius: 20px;
            padding: 20px; text-align: center; border-bottom: 6px solid var(--accent-neon);
        }

        .disc {
            width: 130px; height: 130px; border-radius: 50%;
            background: radial-gradient(circle, #333 10%, #000 40%, #111 70%);
            margin: 15px auto; border: 4px solid #222;
            animation: spin 3s linear infinite paused;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .fader-section { margin: 20px 0; text-align: center; }
        .crossfader { width: 300px; accent-color: var(--accent-neon); cursor: pointer; }

        /* قسم البحث الجديد */
        .search-deck {
            width: 650px; background: var(--deck-bg); padding: 20px;
            border-radius: 15px; margin-top: 25px; border: 1px solid var(--border-color);
        }

        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-box input {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333;
            background: #0d1117; color: white; font-family: 'Cairo';
        }

        .results-container { max-height: 250px; overflow-y: auto; }
        .song-item {
            display: flex; justify-content: space-between; padding: 12px;
            border-bottom: 1px solid #222; cursor: pointer; transition: 0.2s;
        }
        .song-item:hover { background: rgba(0, 242, 255, 0.1); color: var(--accent-neon); }

        button {
            background: var(--accent-neon); color: black; border: none;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
        }

        .loader { display: none; text-align: center; color: var(--accent-neon); margin: 10px; }
    </style>
</head>
<body>

    <h1>🎧 دي جي شواحة PRO 🎧</h1>

    <div class="mixer-wrap">
        <div class="decks-row">
            <div class="deck">
                <h3 id="nameA">TRACK A</h3>
                <div id="discA" class="disc"></div>
                <audio id="audioA"></audio>
                <button onclick="toggle('A')">PLAY / PAUSE</button>
            </div>
            <div class="deck" style="border-bottom-color: var(--accent-pink);">
                <h3 id="nameB">TRACK B</h3>
                <div id="discB" class="disc"></div>
                <audio id="audioB"></audio>
                <button onclick="toggle('B')">PLAY / PAUSE</button>
            </div>
        </div>
        <div class="fader-section">
            <input type="range" id="crossfader" class="crossfader" min="0" max="1" step="0.01" value="0.5" oninput="applyMix()">
        </div>
    </div>

    <div class="search-deck">
        <div class="search-box">
            <input type="text" id="query" placeholder="ابحث عن أغنية في ألبوماتي...">
            <button onclick="searchAlbumaty()">بحث 🔍</button>
        </div>
        <div id="loader" class="loader">جاري البحث في ألبوماتي...</div>
        <div id="results" class="results-container">
            </div>
    </div>

    <script>
        const audioA = document.getElementById('audioA');
        const audioB = document.getElementById('audioB');

        async function searchAlbumaty() {
            const query = document.getElementById('query').value;
            const results = document.getElementById('results');
            const loader = document.getElementById('loader');
            
            if(!query) return;
            results.innerHTML = "";
            loader.style.display = "block";

            try {
                // نستخدم محرك بحث ألبوماتي عبر البروكسي
                const searchUrl = `https://www.albumaty.com/search?q=${encodeURIComponent(query)}`;
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                const links = doc.querySelectorAll('a[href*="/song/"]');

                if(links.length === 0) {
                    results.innerHTML = "<p style='text-align:center;'>عذراً، لم نجد نتائج. حاول بكلمات أخرى.</p>";
                }

                links.forEach((link, i) => {
                    if(i < 15 && link.innerText.trim().length > 3) {
                        const row = document.createElement('div');
                        row.className = 'song-item';
                        row.innerHTML = `<span>🎵 ${link.innerText.trim()}</span> <small>تحميل</small>`;
                        row.onclick = () => {
                            const choice = confirm(`تحميل على الـ Deck A؟\n(OK = A | Cancel = B)`);
                            // تحويل الرابط لرابط MP3 تقريبي
                            let streamUrl = link.href.replace("https://lrz15.github.io", "https://www.albumaty.com")
                                                     .replace("/song/", "/download/") + ".mp3";
                            
                            if(choice) { audioA.src = streamUrl; document.getElementById('nameA').innerText = link.innerText; }
                            else { audioB.src = streamUrl; document.getElementById('nameB').innerText = link.innerText; }
                        };
                        results.appendChild(row);
                    }
                });
            } catch (err) {
                results.innerHTML = "<p style='text-align:center; color:red;'>خطأ في الاتصال. جرب مرة أخرى.</p>";
            } finally {
                loader.style.display = "none";
            }
        }

        function toggle(deck) {
            const a = (deck === 'A') ? audioA : audioB;
            const d = (deck === 'A') ? discA : discB;
            a.paused ? (a.play(), d.style.animationPlayState = 'running') : (a.pause(), d.style.animationPlayState = 'paused');
        }

        function applyMix() {
            const f = document.getElementById('crossfader').value;
            audioA.volume = 1 - f;
            audioB.volume = f;
        }
    </script>
</body>
</html>
