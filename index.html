<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دي جي شواحة PRO | الميكسر الذكي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0e14;
            --deck-bg: #161b22;
            --accent-neon: #00f2ff;
            --accent-pink: #ff007a;
            --text-color: #e6edf3;
            --border-color: #30363d;
        }

        body {
            margin: 0; font-family: 'Cairo', sans-serif;
            background-color: var(--bg-main); color: var(--text-color);
            display: flex; flex-direction: column; align-items: center; padding: 15px;
        }

        .mixer-wrap {
            background: #1d2127; padding: 20px; border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); border: 1px solid var(--border-color);
            width: 100%; max-width: 700px;
        }

        .decks-row { display: flex; gap: 15px; justify-content: space-around; flex-wrap: wrap; }

        .deck {
            flex: 1; min-width: 280px; background: var(--deck-bg); border-radius: 15px;
            padding: 15px; text-align: center; border-bottom: 5px solid var(--accent-neon);
            margin-bottom: 10px;
        }

        .disc {
            width: 120px; height: 120px; border-radius: 50%;
            background: radial-gradient(circle, #333 10%, #000 40%, #111 70%);
            margin: 15px auto; border: 4px solid #222;
            animation: spin 3s linear infinite paused;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .fader-section { margin: 20px 0; text-align: center; width: 100%; }
        .crossfader { width: 80%; accent-color: var(--accent-neon); cursor: pointer; height: 10px; }

        .search-deck {
            width: 100%; max-width: 700px; background: var(--deck-bg); padding: 20px;
            border-radius: 15px; margin-top: 20px; border: 1px solid var(--border-color);
            box-sizing: border-box;
        }

        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box input {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333;
            background: #0d1117; color: white; font-family: 'Cairo'; font-size: 14px;
        }

        .results-container { max-height: 200px; overflow-y: auto; background: #0d1117; border-radius: 8px; }
        .song-item {
            display: flex; justify-content: space-between; padding: 12px;
            border-bottom: 1px solid #222; cursor: pointer; font-size: 14px;
        }
        .song-item:hover { background: rgba(0, 242, 255, 0.1); color: var(--accent-neon); }

        button {
            background: var(--accent-neon); color: black; border: none;
            padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: 0.2s;
        }
        button:active { transform: scale(0.95); }

        .loader { display: none; text-align: center; color: var(--accent-neon); margin: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <h2 style="text-align:center; margin-bottom:15px;">🎧 دي جي شواحة PRO 🎧</h2>

    <div class="mixer-wrap">
        <div class="decks-row">
            <div class="deck">
                <h4 id="nameA" style="margin:5px 0;">TRACK A</h4>
                <div id="discA" class="disc"></div>
                <audio id="audioA" crossorigin="anonymous"></audio>
                <button onclick="toggle('A')">PLAY / PAUSE</button>
            </div>
            <div class="deck" style="border-bottom-color: var(--accent-pink);">
                <h4 id="nameB" style="margin:5px 0;">TRACK B</h4>
                <div id="discB" class="disc"></div>
                <audio id="audioB" crossorigin="anonymous"></audio>
                <button onclick="toggle('B')">PLAY / PAUSE</button>
            </div>
        </div>

        <div class="fader-section">
            <div style="font-size: 12px; margin-bottom: 5px; color: var(--accent-neon);">🎚️ شريط المزج (Crossfader)</div>
            <input type="range" id="crossfader" class="crossfader" min="0" max="1" step="0.01" value="0.5" oninput="applyMix()">
        </div>
    </div>

    <div class="search-deck">
        <div class="search-box">
            <input type="text" id="query" placeholder="ابحث عن أغنية أو ضع رابط ألبوماتي...">
            <button onclick="smartSearch()">بحث 🔍</button>
        </div>
        <div id="loader" class="loader">جاري الاتصال بألبوماتي...</div>
        <div id="results" class="results-container"></div>
    </div>

    <script>
        const audioA = document.getElementById('audioA');
        const audioB = document.getElementById('audioB');

        // دالة البحث الذكية
        async function smartSearch() {
            const input = document.getElementById('query').value.trim();
            const results = document.getElementById('results');
            const loader = document.getElementById('loader');

            if (!input) return;
            results.innerHTML = "";
            loader.style.display = "block";

            // إذا كان المدخل رابطاً مباشراً من ألبوماتي
            if (input.includes("albumaty.com/song/")) {
                loader.style.display = "none";
                addSongRow("رابط مباشر مستخرج", input);
                return;
            }

            try {
                // البحث باستخدام بروكسي AllOrigins
                const searchUrl = `https://www.albumaty.com/search?q=${encodeURIComponent(input)}`;
                const response = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(searchUrl)}`);
                const data = await response.json();
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                const links = doc.querySelectorAll('a[href*="/song/"]');

                if (links.length === 0) {
                    results.innerHTML = "<p style='text-align:center; padding:10px;'>لم نجد نتائج. تأكد من الاسم.</p>";
                }

                links.forEach((link, i) => {
                    if (i < 12 && link.innerText.trim().length > 2) {
                        let fullUrl = link.href;
                        if (!fullUrl.startsWith('http')) fullUrl = "https://www.albumaty.com" + link.getAttribute('href');
                        addSongRow(link.innerText.trim(), fullUrl);
                    }
                });
            } catch (err) {
                results.innerHTML = "<p style='text-align:center; color:red; padding:10px;'>خطأ في الشبكة. جرب مرة أخرى.</p>";
            } finally {
                loader.style.display = "none";
            }
        }

        function addSongRow(name, url) {
            const container = document.getElementById('results');
            const div = document.createElement('div');
            div.className = 'song-item';
            div.innerHTML = `<span>🎵 ${name}</span> <small>اختر Deck</small>`;
            
            div.onclick = () => {
                const choice = confirm(`تحميل "${name}"؟\n\nOK = Deck A (يسار)\nCancel = Deck B (يمين)`);
                
                // تحويل رابط الصفحة إلى رابط MP3 مباشر (سياسة ألبوماتي)
                let mp3Url = url.replace("/song/", "/download/").split('.html')[0] + ".mp3";
                
                if (choice) {
                    audioA.src = mp3Url;
                    document.getElementById('nameA').innerText = name;
                    audioA.play();
                    document.getElementById('discA').style.animationPlayState = 'running';
                } else {
                    audioB.src = mp3Url;
                    document.getElementById('nameB').innerText = name;
                    audioB.play();
                    document.getElementById('discB').style.animationPlayState = 'running';
                }
            };
            container.appendChild(div);
        }

        function toggle(deck) {
            const audio = (deck === 'A') ? audioA : audioB;
            const disc = (deck === 'A') ? document.getElementById('discA') : document.getElementById('discB');
            if (audio.paused) {
                audio.play();
                disc.style.animationPlayState = 'running';
            } else {
                audio.pause();
                disc.style.animationPlayState = 'paused';
            }
        }

        function applyMix() {
            const faderValue = document.getElementById('crossfader').value;
            audioA.volume = 1 - faderValue;
            audioB.volume = faderValue;
        }
    </script>
</body>
</html>
