<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة أغنية - add-song.html</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #121212; 
            color: white; 
            padding: 20px; 
            text-align: center; 
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { color: #1db954; margin-bottom: 25px; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #282828; 
            color: white;
            box-sizing: border-box;
        }
        button { 
            width: 100%;
            padding: 12px; 
            margin-top: 20px;
            background: #1db954; 
            color: white; 
            border: none; 
            border-radius: 25px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { background: #1ed760; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="container">
        <h2>إضافة أغنية جديدة</h2>
        <input type="text" id="songTitle" placeholder="اسم الأغنية">
        <input type="text" id="songArtist" placeholder="اسم الفنان">
        <input type="text" id="songImage" placeholder="رابط صورة الغلاف (URL)">
        <input type="text" id="songUrl" placeholder="رابط ملف الأغنية (URL)">
        
        <button id="uploadBtn">نشر الأغنية في المكتبة</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعدادات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "AIzaSyAskiLw4M7EWxz1i-1REQUsGejAL3mQ44A",
            authDomain: "ashes-studio.firebaseapp.com",
            projectId: "ashes-studio",
            storageBucket: "ashes-studio.firebasestorage.app",
            messagingSenderId: "724089429725",
            appId: "1:724089429725:web:4f1031dc4c72cefff60534",
            measurementId: "G-H38F13MK9F"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('uploadBtn').onclick = function() {
            const title = document.getElementById('songTitle').value;
            const artist = document.getElementById('songArtist').value;
            const image = document.getElementById('songImage').value;
            const url = document.getElementById('songUrl').value;

            if(title && url) {
                push(ref(db, 'songs'), {
                    title: title,
                    artist: artist,
                    cover: image,
                    link: url,
                    timestamp: Date.now()
                }).then(() => {
                    alert("تم الحفظ بنجاح في Ashes Studio!");
                    document.querySelectorAll('input').forEach(input => input.value = '');
                }).catch((error) => {
                    alert("خطأ في الاتصال: " + error.message);
                });
            } else {
                alert("لطفاً، أدخل اسم الأغنية والرابط");
            }
        };
    </script>
</body>
</html>
