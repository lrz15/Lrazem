<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إضافة أغنية لـ SHEE7 Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* الستايل المتوافق مع الصفحة الرئيسية */
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(145deg,#0a0f1e,#0c1222); 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px;
        }
        
        .container { 
            max-width: 500px; 
            width: 100%; 
            background: rgba(10, 14, 23, 0.75); 
            backdrop-filter: blur(10px); 
            padding: 40px; 
            border-radius: 48px; 
            box-shadow: 0 25px 45px rgba(0,0,0,0.5); 
            border: 1px solid rgba(255, 255, 255, 0.15); 
            text-align: center; 
        }

        h2 { 
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg,#FFD966,#FF8C42);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 30px; 
        }

        .preview-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 2px solid rgba(255, 255, 200, 0.2);
            background: #000;
        }

        .preview-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: 0.3s;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #ffd966;
            margin-bottom: 5px;
            margin-right: 15px;
        }

        input { 
            width: 100%; 
            padding: 14px 20px; 
            border-radius: 60px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(0, 0, 0, 0.4); 
            color: white; 
            box-sizing: border-box; 
            font-family: 'Cairo';
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #ffaa44;
            background: rgba(0, 0, 0, 0.6);
        }

        button { 
            width: 100%; 
            padding: 16px; 
            margin-top: 15px; 
            background: #ffaa33; 
            color: #1e1e2a; 
            border: none; 
            border-radius: 60px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size: 18px; 
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 170, 51, 0.2);
        }

        button:hover { 
            background: #ffd966; 
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(255, 170, 51, 0.3);
        }

        .status { 
            margin-top: 20px; 
            font-size: 0.9rem; 
            color: #aaa; 
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #ffd966;
            text-decoration: none;
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .back-link:hover { opacity: 1; }
    </style>
</head>
<body>

    <div class="container">
        <h2><i class="fas fa-plus-circle"></i> إضافة أغنية جديدة</h2>
        
        <div class="preview-wrapper">
            <img id="imagePreview" class="preview-img" src="https://via.placeholder.com/400x225?text=Preview+Image" alt="معاينة الغلاف">
        </div>
        
        <div class="input-group">
            <label>رابط يوتيوب</label>
            <input type="text" id="songUrl" placeholder="https://www.youtube.com/watch?v=...">
        </div>

        <div class="input-group">
            <label>اسم الأغنية (Title)</label>
            <input type="text" id="songTitle" placeholder="مثلاً: مهرجان شواحة الجديد">
        </div>

        <div class="input-group">
            <label>اسم الفنان</label>
            <input type="text" id="songArtist" placeholder="مثلاً: شواحة">
        </div>

        <input type="hidden" id="songImage">
        
        <button id="uploadBtn"><i class="fas fa-cloud-upload-alt"></i> نشر في Ashes Studio</button>
        
        <p id="statusMsg" class="status"></p>
        
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للمشغل الرئيسي</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // إعدادات Firebase (نفس إعدادات الصفحة الرئيسية لضمان الربط)
        const firebaseConfig = {
            apiKey: "AIzaSyAskiLw4M7EWxz1i-1REQUsGejAL3mQ44A",
            authDomain: "ashes-studio.firebaseapp.com",
            projectId: "ashes-studio",
            databaseURL: "https://ashes-studio-default-rtdb.firebaseio.com",
            appId: "1:724089429725:web:4f1031dc4c72cefff60534"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlInput = document.getElementById('songUrl');
        const imgPreview = document.getElementById('imagePreview');
        const songImageInput = document.getElementById('songImage');

        function getYoutubeId(url) {
            const regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?v=))([^#&?]*).*/;
            const match = url.match(regExp);
            return (match && match[7].length === 11) ? match[7] : null;
        }

        urlInput.oninput = function() {
            const videoId = getYoutubeId(this.value);
            if (videoId) {
                // استخدام جودة عالية للغلاف
                const thumbUrl = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;
                imgPreview.src = thumbUrl;
                songImageInput.value = thumbUrl;
            }
        };

        document.getElementById('uploadBtn').onclick = function() {
            const title = document.getElementById('songTitle').value;
            const artist = document.getElementById('songArtist').value;
            const videoId = getYoutubeId(urlInput.value);
            const cover = songImageInput.value;

            if (title && videoId) {
                const btn = this;
                btn.disabled = true;
                btn.innerText = "جاري الحفظ في SHEE7...";
                document.getElementById('statusMsg').innerText = "يتم الآن الربط مع المكتبة السحابية...";
                
                push(ref(db, 'songs'), {
                    title: title,
                    artist: artist,
                    cover: cover,
                    link: videoId,
                    timestamp: Date.now()
                }).then(() => {
                    alert("✅ تمت إضافة " + title + " لمكتبة SHEE7 Studio!");
                    location.reload();
                }).catch(err => {
                    alert("حدث خطأ: " + err.message);
                    btn.disabled = false;
                    btn.innerText = "نشر الأغنية";
                });
            } else {
                alert("يرجى وضع رابط فيديو صحيح واسم للأغنية");
            }
        };
    </script>
</body>
</html>
