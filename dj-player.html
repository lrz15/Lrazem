<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>دي جي شواحة | مشغل يوتيوب مزدوج - نسخة عملاقة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
        body{background:linear-gradient(145deg,#0a0f1e,#0c1222);font-family:'Cairo',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
        .dj-container{max-width:1400px;width:100%;background:rgba(10,14,23,0.75);backdrop-filter:blur(10px);border-radius:48px;box-shadow:0 25px 45px rgba(0,0,0,0.5),inset 0 1px 1px rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:20px 25px 30px;}
        .studio-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:30px;padding-bottom:15px;border-bottom:2px solid rgba(255,255,255,0.1);}
        .logo{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#FFD966,#FF8C42);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .dj-name{font-size:1.3rem;font-weight:600;background:rgba(255,255,240,0.1);padding:6px 20px;border-radius:40px;color:#f0f0f0;}
        .cloud-lib{font-size:0.9rem;color:#aaa;display:flex;align-items:center;gap:8px;}
        .decks-wrapper{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:30px;}
        .deck{flex:1;min-width:280px;background:rgba(0,0,0,0.45);border-radius:32px;padding:18px 15px 20px;backdrop-filter:blur(4px);box-shadow:0 8px 20px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);}
        .deck h3{color:#ffd966;font-weight:700;margin-bottom:12px;font-size:1.3rem;display:flex;align-items:center;gap:10px;justify-content:center;}
        .video-wrapper{position:relative;width:100%;border-radius:24px;overflow:hidden;aspect-ratio:16/9;background:#000;box-shadow:0 10px 25px rgba(0,0,0,0.5);margin-bottom:15px;border:2px solid rgba(255,255,200,0.2);}
        .video-wrapper iframe{width:100%;height:100%;}
        .time-info{direction:ltr;text-align:center;background:#00000066;padding:8px;border-radius:60px;font-family:monospace;font-size:1rem;font-weight:bold;color:#0ff;text-shadow:0 0 3px cyan;margin:10px 0;}
        .volume-control{display:flex;align-items:center;gap:12px;margin:12px 0;background:rgba(30,30,50,0.6);padding:8px 12px;border-radius:40px;}
        .volume-control label{font-size:0.85rem;color:#ccc;}
        input[type="range"]{flex:1;height:5px;-webkit-appearance:none;background:#3a3f5e;border-radius:5px;}
        input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#ffaa44;cursor:pointer;box-shadow:0 0 6px gold;}
        .btn-group{display:flex;justify-content:center;gap:15px;margin-top:12px;}
        .btn-icon{background:rgba(20,25,45,0.9);border:none;color:white;font-size:1rem;padding:8px 16px;border-radius:60px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;font-weight:600;border:1px solid rgba(255,215,0,0.3);}
        .btn-icon:hover{background:#ffaa33;color:#1e1e2a;transform:scale(1.02);}
        .mixer-panel{background:rgba(0,0,0,0.5);border-radius:60px;padding:18px 25px;margin-top:15px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:20px;backdrop-filter:blur(8px);border:1px solid rgba(255,200,100,0.3);}
        .crossfader-area{flex:2;min-width:180px;text-align:center;}
        .crossfader-area label{display:block;font-size:0.8rem;color:#ffbb77;margin-bottom:5px;}
        .crossfader{width:100%;}
        .global-controls{display:flex;gap:20px;flex-wrap:wrap;}
        .big-btn{padding:12px 24px;font-size:1.1rem;}
        .sync-btn{background:#1f2a3e;border-color:#33ffcc;color:#aaffdd;}
        .sync-btn:hover{background:#33ffcc;color:#0a0f1e;}
        .footer-note{text-align:center;margin-top:25px;font-size:0.8rem;color:#aaa;border-top:1px dashed #333;padding-top:18px;}
        .url-input{display:flex;gap:8px;margin-top:12px;background:#00000055;padding:5px 10px;border-radius:60px;}
        .url-input input{flex:1;background:#1e1f2c;border:none;padding:6px 12px;border-radius:40px;color:white;font-size:0.7rem;}
        .url-input button{background:none;border:1px solid #ffaa44;color:#ffaa44;border-radius:30px;padding:4px 12px;cursor:pointer;}
        @media (max-width:850px){.dj-container{padding:15px;}}
    </style>
</head>
<body>
<div class="dj-container">
    <div class="studio-header">
        <div class="logo">🎧 ASHES STUDIO</div>
        <div class="dj-name"><i class="fas fa-headphones"></i> دي جي شواحة</div>
        <div class="cloud-lib"><i class="fas fa-cloud-music"></i> مكتبة الأغاني السحابية</div>
    </div>
    <div class="decks-wrapper">
        <!-- القناة اليسرى A -->
        <div class="deck">
            <h3><i class="fab fa-youtube"></i> القناة A | يوتيوب 1</h3>
            <div class="video-wrapper" id="playerLeftWrapper"><div id="playerLeft"></div></div>
            <div class="time-info" id="timeLeft">00:00 / 00:00</div>
            <div class="volume-control"><label><i class="fas fa-volume-down"></i> VOL A</label><input type="range" id="volLeft" min="0" max="100" value="100"><span id="volLeftVal">100%</span></div>
            <div class="btn-group"><button class="btn-icon" id="playLeft"><i class="fas fa-play"></i> تشغيل</button><button class="btn-icon" id="pauseLeft"><i class="fas fa-pause"></i> إيقاف</button></div>
            <div class="url-input"><i class="fab fa-youtube" style="color:#ff4444;"></i><input type="text" id="leftUrl" placeholder="رابط أو ID فيديو" value="dQw4w9WgXcQ"><button id="loadLeft">تحميل</button></div>
        </div>
        <!-- القناة اليمنى B -->
        <div class="deck">
            <h3><i class="fab fa-youtube"></i> القناة B | يوتيوب 2</h3>
            <div class="video-wrapper" id="playerRightWrapper"><div id="playerRight"></div></div>
            <div class="time-info" id="timeRight">00:00 / 00:00</div>
            <div class="volume-control"><label><i class="fas fa-volume-down"></i> VOL B</label><input type="range" id="volRight" min="0" max="100" value="100"><span id="volRightVal">100%</span></div>
            <div class="btn-group"><button class="btn-icon" id="playRight"><i class="fas fa-play"></i> تشغيل</button><button class="btn-icon" id="pauseRight"><i class="fas fa-pause"></i> إيقاف</button></div>
            <div class="url-input"><i class="fab fa-youtube" style="color:#ff4444;"></i><input type="text" id="rightUrl" placeholder="رابط أو ID فيديو" value="M7lc1UVf-VE"><button id="loadRight">تحميل</button></div>
        </div>
    </div>
    <div class="mixer-panel">
        <div class="crossfader-area"><label><i class="fas fa-arrow-left"></i> CROSSFADER (انتقال صوتي) <i class="fas fa-arrow-right"></i></label><input type="range" id="crossfader" min="0" max="100" value="50" step="1"><div style="display:flex; justify-content:space-between; color:#ffaa77;"><span>قناة A</span><span>◄ مزج ►</span><span>قناة B</span></div></div>
        <div class="global-controls"><button class="btn-icon big-btn" id="globalPlayPause"><i class="fas fa-play-circle"></i> تشغيل/إيقاف الكل</button><button class="btn-icon sync-btn" id="autoSync"><i class="fas fa-sync-alt"></i> AUTO SYNC (زامن A←B)</button></div>
    </div>
    <div class="footer-note"><i class="fas fa-sliders-h"></i> التحكم بكل قناة بشكل منفصل + كروس فيدر لمزج الصوت بين الفيديوين</div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let playerA, playerB;
    let readyA = false, readyB = false;
    let volAraw = 100, volBraw = 100, crossPos = 50;

    // استخراج ID من رابط يوتيوب
    function getYoutubeId(url) {
        if(!url) return null;
        if(url.length===11 && /^[a-zA-Z0-9_-]{11}$/.test(url)) return url;
        let regExp = /^.*((youtu.be\/)|(v\/)|(\/u\/\w\/)|(embed\/)|(watch\?v=))([^#&?]*).*/;
        let match = url.match(regExp);
        return (match&&match[7].length===11)? match[7] : null;
    }

    // حساب الصوت النهائي بناءً على الكروس فيدر
    function applyVolumeMix() {
        if(!readyA || !readyB) return;
        let mixA = (1 - (crossPos/100)) * (volAraw/100);
        let mixB = (crossPos/100) * (volBraw/100);
        let finalA = Math.min(100, Math.max(0, Math.floor(mixA * 100)));
        let finalB = Math.min(100, Math.max(0, Math.floor(mixB * 100)));
        playerA.setVolume(finalA);
        playerB.setVolume(finalB);
    }

    // أحداث التحكم
    document.getElementById('volLeft').addEventListener('input', (e) => { volAraw = parseInt(e.target.value); document.getElementById('volLeftVal').innerText = volAraw+'%'; applyVolumeMix(); });
    document.getElementById('volRight').addEventListener('input', (e) => { volBraw = parseInt(e.target.value); document.getElementById('volRightVal').innerText = volBraw+'%'; applyVolumeMix(); });
    document.getElementById('crossfader').addEventListener('input', (e) => { crossPos = parseInt(e.target.value); applyVolumeMix(); });

    // أزرار التشغيل والإيقاف
    document.getElementById('playLeft').onclick = () => { if(readyA) playerA.playVideo(); };
    document.getElementById('pauseLeft').onclick = () => { if(readyA) playerA.pauseVideo(); };
    document.getElementById('playRight').onclick = () => { if(readyB) playerB.playVideo(); };
    document.getElementById('pauseRight').onclick = () => { if(readyB) playerB.pauseVideo(); };
    document.getElementById('globalPlayPause').onclick = () => {
        if(readyA && readyB) {
            (playerA.getPlayerState()===1 || playerB.getPlayerState()===1) ? (playerA.pauseVideo(), playerB.pauseVideo()) : (playerA.playVideo(), playerB.playVideo());
        }
    };
    document.getElementById('autoSync').onclick = () => {
        if(readyA && readyB) {
            let timeA = playerA.getCurrentTime();
            playerB.seekTo(timeA, true);
            if(playerA.getPlayerState()===1) playerB.playVideo(); else playerB.pauseVideo();
        } else alert("انتظر حتى تحميل الفيديوهين");
    };

    // تحميل فيديوهات جديدة
    document.getElementById('loadLeft').onclick = () => {
        let vid = getYoutubeId(document.getElementById('leftUrl').value.trim());
        if(vid && readyA) playerA.loadVideoById(vid);
        else if(vid && !readyA) alert("المشغل الأيسر لم يصبح جاهزاً بعد");
        else alert("رابط يوتيوب غير صالح");
    };
    document.getElementById('loadRight').onclick = () => {
        let vid = getYoutubeId(document.getElementById('rightUrl').value.trim());
        if(vid && readyB) playerB.loadVideoById(vid);
        else if(vid && !readyB) alert("المشغل الأيمن لم يصبح جاهزاً بعد");
        else alert("رابط يوتيوب غير صالح");
    };

    // تحديث الوقت
    function updateTime() {
        if(readyA && playerA.getCurrentTime) {
            let cur = playerA.getCurrentTime(), dur = playerA.getDuration();
            document.getElementById('timeLeft').innerHTML = `${formatTime(cur)} / ${formatTime(dur)}`;
        }
        if(readyB && playerB.getCurrentTime) {
            let cur = playerB.getCurrentTime(), dur = playerB.getDuration();
            document.getElementById('timeRight').innerHTML = `${formatTime(cur)} / ${formatTime(dur)}`;
        }
    }
    function formatTime(sec) { if(isNaN(sec)) return "00:00"; let m=Math.floor(sec/60), s=Math.floor(sec%60); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
    setInterval(updateTime, 500);

    // تهيئة المشغلين
    function onYouTubeIframeAPIReady() {
        playerA = new YT.Player('playerLeft', {
            height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ',
            playerVars: { controls: 1, modestbranding: 1, rel: 0, autoplay: 0 },
            events: { onReady: (e) => { readyA=true; applyVolumeMix(); }, onStateChange: updateTime }
        });
        playerB = new YT.Player('playerRight', {
            height: '100%', width: '100%', videoId: 'M7lc1UVf-VE',
            playerVars: { controls: 1, modestbranding: 1, rel: 0, autoplay: 0 },
            events: { onReady: (e) => { readyB=true; applyVolumeMix(); }, onStateChange: updateTime }
        });
    }
    // تأكد من استدعاء الـ API
    if(typeof YT === 'undefined') window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
    else onYouTubeIframeAPIReady();
</script>
</body>
</html>
