<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دي جي شواحة - Ashes Studio PRO</title>
    <style>
        :root { --neon-green: #1db954; --bg-dark: #0a0a0a; --panel-bg: #161616; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .dj-header { text-align: center; margin-bottom: 20px; }
        .dj-name { font-size: 2.8rem; font-weight: bold; text-shadow: 0 0 15px var(--neon-green); letter-spacing: 3px; margin: 0; }
        .studio-tag { color: var(--neon-green); font-size: 0.9rem; letter-spacing: 5px; }

        /* توزيع الواجهة: Side by Side */
        .main-container { display: flex; align-items: stretch; justify-content: center; gap: 15px; width: 100%; max-width: 1250px; margin-top: 10px; }

        .deck { flex: 1; background: var(--panel-bg); border: 2px solid #333; border-radius: 25px; padding: 20px; text-align: center; box-shadow: 0 10px 30px #000; position: relative; }
        
        /* المكسر الأوسط */
        .center-mixer { width: 140px; background: #111; border: 2px solid #333; border-radius: 15px; display: flex; flex-direction: column; align-items: center; padding: 15px 5px; justify-content: space-between; }

        .turntable { width: 140px; height: 140px; background: radial-gradient(circle, #222 15%, #000 100%); border: 6px solid #333; border-radius: 50%; margin: 0 auto 15px; position: relative; transition: transform 0.5s; }
        .turntable::after { content: ""; position: absolute; top: 50%; left: 50%; width: 25px; height: 25px; background: var(--neon-green); border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 10px var(--neon-green); }
        .rotating { animation: rotate 3s linear infinite; }

        .track-info { background: #000; color: var(--neon-green); padding: 5px; border-radius: 8px; font-family: monospace; font-size: 0.85rem; height: 20px; margin-bottom: 10px; border: 1px solid #222; overflow: hidden; }
        
        .progress-box { margin-bottom: 10px; }
        .time-txt { font-size: 11px; color: #777; margin-bottom: 3px; display: block; }
        input[type="range"] { width: 100%; accent-color: var(--neon-green); cursor: pointer; }

        /* مكسر عمودي وفيدرات */
        .v-slider { writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 10px; height: 180px; accent-color: var(--neon-green); }
        .mixer-label { font-size: 10px; color: #666; margin: 5px 0; }

        /* أزرار الانتقال الذكي */
        .auto-transition-unit { width: 100%; display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .fx-btn { background: #222; border: 1px solid var(--neon-green); color: var(--neon-green); padding: 8px; border-radius: 5px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .fx-btn:hover { background: var(--neon-green); color: #000; }
        .fx-btn.active { background: #ff4444; color: #fff; border-color: #ff4444; }

        .btn-group { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .play-btn { background: #1db954; color: #000; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; flex: 1; }
        .stop-btn { background: #333; color: #fff; border: none; padding: 10px 10px; border-radius: 5px; cursor: pointer; }

        /* البحث في الأسفل */
        .search-area { margin-top: 25px; }
        .search-trigger { background: var(--neon-green); color: #000; border: none; padding: 15px 60px; border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px rgba(29, 185, 84, 0.4); }

        #searchModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #1a1a1a; width: 90%; max-width: 450px; padding: 25px; border-radius: 20px; border: 1px solid var(--neon-green); max-height: 70vh; overflow-y: auto; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; }
        .song-item button { background: #333; color: #fff; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; margin-left: 5px; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @media (max-width: 800px) { .main-container { flex-direction: column; align-items: center; } .center-mixer { width: 90%; height: auto; flex-direction: row; } .v-slider { height: 100px; } }
    </style>
</head>
<body>

    <div class="dj-header">
        <div class="studio-tag">ASHES STUDIO</div>
        <h1 class="dj-name">دي جي شواحة</h1>
    </div>

    <div class="main-container">
        <div class="deck" id="panel-a">
            <div class="turntable" id="disc-a"></div>
            <div class="track-info" id="info-a">قيد الانتظار A...</div>
            
            <div class="progress-box">
                <span class="time-txt" id="time-a">00:00 / 00:00</span>
                <input type="range" id="progress-a" min="0" max="100" value="0">
            </div>

            <div class="btn-group">
                <button class="play-btn" onclick="togglePlay('a')">PLAY / PAUSE</button>
                <button class="stop-btn" onclick="stopDeck('a')">■</button>
            </div>
            <audio id="audio-a" crossorigin="anonymous"></audio>
        </div>

        <div class="center-mixer">
            <div style="display:flex; gap: 15px;">
                <div style="text-align:center">
                    <div class="mixer-label">VOL A</div>
                    <input type="range" class="v-slider" id="fader-a" min="0" max="1" step="0.01" value="0.8">
                </div>
                <div style="text-align:center">
                    <div class="mixer-label">VOL B</div>
                    <input type="range" class="v-slider" id="fader-b" min="0" max="1" step="0.01" value="0.8">
                </div>
            </div>

            <div class="auto-transition-unit">
                <div class="mixer-label" style="color:var(--neon-green)">AUTO SYNC</div>
                <button class="fx-btn" onclick="startTransition('fade')">FADE ⇄</button>
                <button class="fx-btn" onclick="startTransition('riser')">RISER ⚡</button>
                <button class="fx-btn" onclick="startTransition('sweep')">SWEEP 🌊</button>
            </div>

            <div style="width:100%; text-align:center">
                <div class="mixer-label">CROSSFADER</div>
                <input type="range" id="crossfader" min="-1" max="1" step="0.01" value="0" style="width: 100px;">
            </div>
        </div>

        <div class="deck" id="panel-b">
            <div class="turntable" id="disc-b"></div>
            <div class="track-info" id="info-b">قيد الانتظار B...</div>
            
            <div class="progress-box">
                <span class="time-txt" id="time-b">00:00 / 00:00</span>
                <input type="range" id="progress-b" min="0" max="100" value="0">
            </div>

            <div class="btn-group">
                <button class="play-btn" onclick="togglePlay('b')">PLAY / PAUSE</button>
                <button class="stop-btn" onclick="stopDeck('b')">■</button>
            </div>
            <audio id="audio-b" crossorigin="anonymous"></audio>
        </div>
    </div>

    <div class="search-area">
        <button class="search-trigger" onclick="openSearch()">🔍 مكتبة الأغاني السحابية</button>
    </div>

    <div id="searchModal">
        <div class="modal-content">
            <h3 style="color:var(--neon-green); text-align:center;">مكتبة شواحة</h3>
            <div id="songsList">جاري جلب السحابة...</div>
            <br>
            <button onclick="closeSearch()" style="width:100%; background:#333; color:#fff; border:none; padding:10px; border-radius:10px;">إغلاق</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAskiLw4M7EWxz1i-1REQUsGejAL3mQ44A",
            authDomain: "ashes-studio.firebaseapp.com",
            projectId: "ashes-studio",
            storageBucket: "ashes-studio.firebasestorage.app",
            messagingSenderId: "724089429725",
            appId: "1:724089429725:web:4f1031dc4c72cefff60534"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let audioCtx;
        const decks = {
            a: { audio: null, source: null, gain: null, filter: null, playing: false, index: -1 },
            b: { audio: null, source: null, gain: null, filter: null, playing: false, index: -1 }
        };
        let globalPlaylist = [];

        // تهيئة الصوت عند أول ضغطة
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            setupDeck('a');
            setupDeck('b');
        }

        function setupDeck(id) {
            const audio = document.getElementById('audio-' + id);
            const source = audioCtx.createMediaElementSource(audio);
            const gain = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            
            filter.type = "highpass";
            filter.frequency.value = 20;

            source.connect(filter).connect(gain).connect(audioCtx.destination);
            
            decks[id].audio = audio;
            decks[id].gain = gain;
            decks[id].filter = filter;

            audio.ontimeupdate = () => updateProgress(id);
            audio.onended = () => playNext(id);
        }

        window.togglePlay = (id) => {
            initAudio();
            const deck = decks[id];
            if (deck.audio.paused) {
                deck.audio.play();
                deck.playing = true;
                document.getElementById('disc-' + id).classList.add('rotating');
            } else {
                deck.audio.pause();
                deck.playing = false;
                document.getElementById('disc-' + id).classList.remove('rotating');
            }
        };

        window.stopDeck = (id) => {
            const deck = decks[id];
            deck.audio.pause();
            deck.audio.currentTime = 0;
            deck.playing = false;
            document.getElementById('disc-' + id).classList.remove('rotating');
        };

        function updateProgress(id) {
            const audio = decks[id].audio;
            const prog = document.getElementById('progress-' + id);
            const time = document.getElementById('time-' + id);
            if (audio.duration) {
                prog.value = (audio.currentTime / audio.duration) * 100;
                const cur = formatTime(audio.currentTime);
                const dur = formatTime(audio.duration);
                time.innerText = `${cur} / ${dur}`;
            }
        }

        function formatTime(secs) {
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' + s : s}`;
        }

        // --- نظام الانتقال التلقائي ---
        window.startTransition = (type) => {
            initAudio();
            const from = decks.a.playing ? 'a' : 'b';
            const to = from === 'a' ? 'b' : 'a';
            
            // تجهيز القرص المستهدف بأغنية تالية إذا كان فارغاً
            if (decks[to].audio.src === "") {
                playNext(to);
            }
            
            decks[to].audio.play();
            document.getElementById('disc-' + to).classList.add('rotating');

            const now = audioCtx.currentTime;
            const duration = 4.0; // مدة الانتقال 4 ثواني

            if (type === 'fade') {
                // تداخل صوتي بسيط
                decks[from].gain.gain.linearRampToValueAtTime(0, now + duration);
                decks[to].gain.gain.linearRampToValueAtTime(0.8, now + duration);
            } 
            else if (type === 'riser') {
                // رفع الطبقة + فلتر + فوليوم
                decks[from].filter.frequency.exponentialRampToValueAtTime(5000, now + duration);
                const startRate = decks[from].audio.playbackRate;
                // محاكاة الـ Riser بتسريع الأغنية قليلاً
                let interval = setInterval(() => {
                    if (decks[from].audio.playbackRate < 1.3) decks[from].audio.playbackRate += 0.01;
                }, 100);
                
                decks[from].gain.gain.linearRampToValueAtTime(0, now + duration);
                decks[to].gain.gain.linearRampToValueAtTime(0.8, now + duration);

                setTimeout(() => { 
                    clearInterval(interval); 
                    stopDeck(from);
                    decks[from].audio.playbackRate = 1;
                    decks[from].filter.frequency.value = 20;
                }, duration * 1000);
            } 
            else if (type === 'sweep') {
                // فلتر سويب قوي (High Pass)
                decks[from].filter.frequency.exponentialRampToValueAtTime(15000, now + duration);
                decks[from].gain.gain.linearRampToValueAtTime(0, now + duration);
                decks[to].gain.gain.linearRampToValueAtTime(0.8, now + duration);
                
                setTimeout(() => {
                    stopDeck(from);
                    decks[from].filter.frequency.value = 20;
                }, duration * 1000);
            }
        };

        // فادي القائمة والتحميل
        onValue(ref(db, 'songs'), (snapshot) => {
            const listDiv = document.getElementById('songsList');
            listDiv.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                globalPlaylist = Object.values(data);
                globalPlaylist.forEach((song, index) => {
                    const item = document.createElement('div');
                    item.className = 'song-item';
                    item.innerHTML = `<span>${song.title}</span>
                        <div><button onclick="loadSong('a', ${index})">A</button>
                        <button onclick="loadSong('b', ${index})">B</button></div>`;
                    listDiv.appendChild(item);
                });
            }
        });

        window.loadSong = (id, index) => {
            const song = globalPlaylist[index];
            decks[id].audio.src = song.link;
            decks[id].index = index;
            document.getElementById('info-' + id).innerText = song.title;
            closeSearch();
        };

        function playNext(id) {
            let next = decks[id].index + 1;
            if (next >= globalPlaylist.length) next = 0;
            loadSong(id, next);
            decks[id].audio.play();
        }

        window.openSearch = () => document.getElementById('searchModal').style.display = 'flex';
        window.closeSearch = () => document.getElementById('searchModal').style.display = 'none';

        // المكسر والكروس فيدر
        document.getElementById('fader-a').oninput = (e) => { if(decks.a.gain) decks.a.gain.gain.value = e.target.value; };
        document.getElementById('fader-b').oninput = (e) => { if(decks.b.gain) decks.b.gain.gain.value = e.target.value; };
        document.getElementById('crossfader').oninput = (e) => {
            const val = parseFloat(e.target.value);
            if(decks.a.gain) decks.a.gain.gain.value = Math.max(0, 1 - (val + 1) / 2);
            if(decks.b.gain) decks.b.gain.gain.value = Math.max(0, (val + 1) / 2);
        };
    </script>
</body>
</html>
