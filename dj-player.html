<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>دي جي شواحة | النسخة الاحترافية Ashes Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;user-select:none;}
        body{background:linear-gradient(145deg,#0a0f1e,#0c1222);font-family:'Cairo',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
        .dj-container{max-width:1400px;width:100%;background:rgba(10,14,23,0.75);backdrop-filter:blur(10px);border-radius:48px;box-shadow:0 25px 45px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);padding:20px 25px 30px;}
        .studio-header{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;margin-bottom:30px;padding-bottom:15px;border-bottom:2px solid rgba(255,255,255,0.1);}
        .logo{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#FFD966,#FF8C42);-webkit-background-clip:text;background-clip:text;color:transparent;}
        .dj-name{font-size:1.3rem;font-weight:600;background:rgba(255,255,240,0.1);padding:6px 20px;border-radius:40px;color:#f0f0f0;}
        
        .decks-wrapper{display:flex;flex-wrap:wrap;gap:20px;margin-bottom:30px;}
        .deck{flex:1;min-width:280px;background:rgba(0,0,0,0.45);border-radius:32px;padding:18px 15px 20px;backdrop-filter:blur(4px);box-shadow:0 8px 20px rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);}
        .deck h3{color:#ffd966;font-weight:700;margin-bottom:12px;font-size:1.1rem;display:flex;align-items:center;gap:10px;justify-content:center;text-align:center;}
        .video-wrapper{position:relative;width:100%;border-radius:24px;overflow:hidden;aspect-ratio:16/9;background:#000;border:2px solid rgba(255,255,200,0.2);}
        
        .time-info{direction:ltr;text-align:center;background:#00000066;padding:8px;border-radius:60px;font-family:monospace;font-size:1rem;font-weight:bold;color:#0ff;text-shadow:0 0 3px cyan;margin:10px 0;}
        .volume-control{display:flex;align-items:center;gap:12px;margin:12px 0;background:rgba(30,30,50,0.6);padding:8px 12px;border-radius:40px; color: #ccc; font-size: 0.8rem;}
        
        input[type="range"]{flex:1;height:5px;-webkit-appearance:none;background:#3a3f5e;border-radius:5px;}
        input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:16px;height:16px;border-radius:50%;background:#ffaa44;cursor:pointer;box-shadow:0 0 6px gold;}
        
        .btn-group{display:flex;justify-content:center;gap:15px;margin-top:12px;}
        .btn-icon{background:rgba(20,25,45,0.9);border:none;color:white;font-size:1rem;padding:8px 16px;border-radius:60px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;font-weight:600;border:1px solid rgba(255,215,0,0.3);}
        .btn-icon:hover{background:#ffaa33;color:#1e1e2a;transform:scale(1.02);}

        .mixer-panel{background:rgba(0,0,0,0.5);border-radius:60px;padding:18px 25px;margin-top:15px;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:20px;border:1px solid rgba(255,200,100,0.3);}
        .crossfader-area{flex:2;min-width:180px;text-align:center; color:#ffbb77; font-size: 0.8rem;}
        
        .automix-controls { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 40px; }
        select { background: #1a1a2e; color: #ffd966; border: 1px solid #444; border-radius: 10px; padding: 5px; outline: none; cursor: pointer; font-family: 'Cairo'; }

        .library-box { margin-top: 30px; padding: 25px; background: rgba(0,0,0,0.3); border-radius: 32px; border: 1px solid rgba(255,255,255,0.05); }
        .search-bar { width: 100%; padding: 12px 25px; border-radius: 50px; border: 1px solid #333; background: #1a1a2e; color: white; margin-bottom: 20px; outline: none; font-family: 'Cairo'; }
        .songs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; max-height: 400px; overflow-y: auto; padding: 10px; }
        .song-item { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 20px; text-align: center; border: 1px solid transparent; transition: 0.3s; }
        .song-item:hover { background: rgba(255,255,255,0.08); border-color: #ffd966; }
        .song-item img { width: 100%; border-radius: 15px; aspect-ratio: 1; object-fit: cover; pointer-events: none;}
        .song-item h4 { font-size: 0.85rem; margin: 10px 0; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .load-btns { display: flex; gap: 5px; }
        .load-btns button { flex: 1; padding: 6px; font-size: 0.7rem; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-a { background: #1db954; color: white; }
        .btn-b { background: #ffaa44; color: black; }
    </style>
</head>
<body>

<div class="dj-container">
    <div class="studio-header">
        <div class="logo">🎧 ASHES STUDIO</div>
        <div class="dj-name"><i class="fas fa-headphones"></i> دي جي شواحة</div>
    </div>

    <div class="decks-wrapper">
        <div class="deck">
            <h3 id="displayTitleA"><i class="fab fa-youtube"></i> القناة A | جاهز</h3>
            <div class="video-wrapper"><div id="playerLeft"></div></div>
            <div class="time-info" id="timeLeft">00:00 / 00:00</div>
            <div class="volume-control"><label>VOL A</label><input type="range" id="volLeft" min="0" max="100" value="100"><span id="volLeftVal">100%</span></div>
            <div class="btn-group">
                <button class="btn-icon" id="playLeft"><i class="fas fa-play"></i></button>
                <button class="btn-icon" id="pauseLeft"><i class="fas fa-pause"></i></button>
            </div>
        </div>

        <div class="deck">
            <h3 id="displayTitleB"><i class="fab fa-youtube"></i> القناة B | جاهز</h3>
            <div class="video-wrapper"><div id="playerRight"></div></div>
            <div class="time-info" id="timeRight">00:00 / 00:00</div>
            <div class="volume-control"><label>VOL B</label><input type="range" id="volRight" min="0" max="100" value="100"><span id="volRightVal">100%</span></div>
            <div class="btn-group">
                <button class="btn-icon" id="playRight"><i class="fas fa-play"></i></button>
                <button class="btn-icon" id="pauseRight"><i class="fas fa-pause"></i></button>
            </div>
        </div>
    </div>

    <div class="mixer-panel">
        <div class="crossfader-area">
            <label>CROSSFADER (مزج يدوي)</label>
            <input type="range" id="crossfader" min="0" max="100" value="50">
        </div>
        
        <div class="automix-controls">
            <select id="mixType">
                <option value="fade">تلاشي هادئ (Fade)</option>
                <option value="riser">تصاعد حماسي (Riser)</option>
                <option value="sweep">سحب سريع (Sweep)</option>
            </select>
            <button class="btn-icon sync-btn" id="autoMixBtn"><i class="fas fa-magic"></i> مزج آلي</button>
            <button class="btn-icon big-btn" id="globalPlayPause"><i class="fas fa-play-circle"></i> الكل</button>
        </div>
    </div>

    <div class="library-box">
        <input type="text" id="searchInput" class="search-bar" placeholder="🔍 ابحث في مكتبة Ashes Studio...">
        <div id="songsList" class="songs-grid"></div>
    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAskiLw4M7EWxz1i-1REQUsGejAL3mQ44A",
        authDomain: "ashes-studio.firebaseapp.com",
        projectId: "ashes-studio",
        databaseURL: "https://ashes-studio-default-rtdb.firebaseio.com",
        appId: "1:724089429725:web:4f1031dc4c72cefff60534"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let playerA, playerB;
    let readyA = false, readyB = false;
    let volAraw = 100, volBraw = 100, crossPos = 50;
    let allSongs = [];
    let currentIdxA = -1;

    // جلب الأغاني من Firebase وتحديث المكتبة
    onValue(ref(db, 'songs'), (snapshot) => {
        const data = snapshot.val();
        allSongs = data ? Object.values(data).reverse() : [];
        renderLibrary(allSongs);
    });

    function renderLibrary(songs) {
        const list = document.getElementById('songsList');
        list.innerHTML = songs.map((s, i) => `
            <div class="song-item">
                <img src="${s.cover || 'https://via.placeholder.com/150'}">
                <h4>${s.title}</h4>
                <div class="load-btns">
                    <button class="btn-a" onclick="window.loadSong('A', '${s.link}', ${i})">Deck A</button>
                    <button class="btn-b" onclick="window.loadSong('B', '${s.link}', ${i})">Deck B</button>
                </div>
            </div>
        `).join('');
    }

    // نظام البحث في المكتبة
    document.getElementById('searchInput').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        renderLibrary(allSongs.filter(s => s.title.toLowerCase().includes(term)));
    };

    // تحميل الأغنية للمشغلات
    window.loadSong = (deck, id, index) => {
        if(deck === 'A') {
            currentIdxA = index;
            if(readyA) playerA.loadVideoById(id);
            document.getElementById('displayTitleA').innerHTML = `<i class="fas fa-compact-disc"></i> ${allSongs[index].title}`;
        } else {
            if(readyB) playerB.loadVideoById(id);
            document.getElementById('displayTitleB').innerHTML = `<i class="fas fa-compact-disc"></i> ${allSongs[index].title}`;
        }
    };

    // التحكم بالصوت والمزج اليدوي
    function applyMix() {
        if(!readyA || !readyB) return;
        playerA.setVolume(Math.floor((1 - (crossPos/100)) * volAraw));
        playerB.setVolume(Math.floor((crossPos/100) * volBraw));
    }

    // تهيئة يوتيوب مع إصلاح الأمان
    window.onYouTubeIframeAPIReady = () => {
        playerA = new YT.Player('playerLeft', {
            height: '100%', width: '100%', videoId: 'dQw4w9WgXcQ',
            playerVars: { 'autoplay': 0, 'controls': 1, 'enablejsapi': 1, 'origin': window.location.origin },
            events: { 
                onReady: () => { readyA = true; applyMix(); },
                onStateChange: (e) => { if(e.data === YT.PlayerState.ENDED) playNextA(); }
            }
        });
        playerB = new YT.Player('playerRight', {
            height: '100%', width: '100%', videoId: 'M7lc1UVf-VE',
            playerVars: { 'autoplay': 0, 'controls': 1, 'enablejsapi': 1, 'origin': window.location.origin },
            events: { onReady: () => { readyB = true; applyMix(); } }
        });
    };

    // التشغيل التلقائي للأغنية التالية في القناة A
    function playNextA() {
        if(currentIdxA < allSongs.length - 1) {
            currentIdxA++;
            window.loadSong('A', allSongs[currentIdxA].link, currentIdxA);
        }
    }

    // المزج الآلي الاحترافي (Fade, Riser, Sweep)
    document.getElementById('autoMixBtn').onclick = () => {
        const type = document.getElementById('mixType').value;
        const crossfader = document.getElementById('crossfader');
        let start = parseInt(crossfader.value);
        let target = (start > 50) ? 0 : 100;
        let duration = (type === 'fade') ? 5000 : (type === 'riser') ? 3000 : 800;
        let steps = 50, stepTime = duration / steps;
        let currentStep = 0;

        let interval = setInterval(() => {
            currentStep++;
            let newVal = start + ((target - start) / steps) * currentStep;
            crossfader.value = newVal;
            crossPos = newVal;
            applyMix();
            if (currentStep >= steps) {
                clearInterval(interval);
                if(target === 100) playerA.pauseVideo(); else playerB.pauseVideo();
            }
        }, stepTime);
    };

    // ربط أزرار التحكم
    document.getElementById('volLeft').oninput = (e) => { volAraw = e.target.value; document.getElementById('volLeftVal').innerText = volAraw+'%'; applyMix(); };
    document.getElementById('volRight').oninput = (e) => { volBraw = e.target.value; document.getElementById('volRightVal').innerText = volBraw+'%'; applyMix(); };
    document.getElementById('crossfader').oninput = (e) => { crossPos = e.target.value; applyMix(); };
    document.getElementById('playLeft').onclick = () => playerA.playVideo();
    document.getElementById('pauseLeft').onclick = () => playerA.pauseVideo();
    document.getElementById('playRight').onclick = () => playerB.playVideo();
    document.getElementById('pauseRight').onclick = () => playerB.pauseVideo();
    document.getElementById('globalPlayPause').onclick = () => {
        if(playerA.getPlayerState() === 1) { playerA.pauseVideo(); playerB.pauseVideo(); } 
        else { playerA.playVideo(); playerB.playVideo(); }
    };

    // عداد الوقت
    setInterval(() => {
        if(readyA && playerA.getCurrentTime) {
            document.getElementById('timeLeft').innerText = formatTime(playerA.getCurrentTime()) + " / " + formatTime(playerA.getDuration());
        }
        if(readyB && playerB.getCurrentTime) {
            document.getElementById('timeRight').innerText = formatTime(playerB.getCurrentTime()) + " / " + formatTime(playerB.getDuration());
        }
    }, 1000);

    function formatTime(s) { let m=Math.floor(s/60), sec=Math.floor(s%60); return m.toString().padStart(2,'0')+":"+sec.toString().padStart(2,'0'); }
</script>
</body>
</html>
